# Nur actions/checkout@v4 (lädt auf euren Runnern); kein codeload für andere Actions.
name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-git
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Push docs/ to gh-pages branch
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -rf /tmp/gh-pages-staging
          mkdir -p /tmp/gh-pages-staging
          cp -a docs/. /tmp/gh-pages-staging/
          touch /tmp/gh-pages-staging/.nojekyll
          cd /tmp/gh-pages-staging
          git init -q
          git add -A
          git commit -q -m "deploy: docs from ${GITHUB_SHA}"
          git push -f "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:gh-pages
