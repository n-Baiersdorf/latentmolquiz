# Zuverlässiger Pages-Deploy (ersetzt hängenden „legacy“-Upload bei vielen Dateien in docs/).
name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # configure-pages entfällt: nur statisches docs/-Bundle, kein Jekyll/Next.
      # Vermeidet fehlgeschlagenen codeload-Download (Runner-Fehler bei @v5).
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
